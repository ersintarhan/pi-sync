# Auto-publish to npm on version tags.
# ponytail: tag-driven, so publish is always intentional — `npm version patch && git push --tags`.
# Provenance (sigstore-signed) gives a verifiable build provenance on npm.
name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual run from Actions tab

permissions:
  contents: read
  id-token: write # required for npm provenance

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # DEBUG: dump the OIDC claims npm will compare against the Trusted Publisher config.
      # Remove once publish is green.
      - name: OIDC claims
        run: |
          echo "workflow_ref=$GITHUB_REF"
          echo "repo=$GITHUB_REPOSITORY"
          echo "workflow=$(basename "$GITHUB_WORKFLOW")"
          # request the OIDC token and decode its JWT payload
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm")
          echo "$TOKEN" | python3 -c "import sys,json,base64; t=json.load(sys.stdin)['value']; p=t.split('.')[1]; p+='='*(-4-len(p)%4); print(base64.urlsafe_b64decode(p).decode())" || echo "(could not decode OIDC token)"
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}

      - run: npm publish --access public --provenance
