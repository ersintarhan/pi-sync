# Auto-publish to npm on version tags.
# ponytail: tag-driven, so publish is always intentional — `npm version patch && git push --tags`.
# Provenance (sigstore-signed) gives a verifiable build provenance on npm.
name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual run from Actions tab

permissions:
  contents: read
  id-token: write # required for npm provenance

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # npm 11+ required for OIDC trusted publishing (Node 20 ships npm 10)
          registry-url: "https://registry.npmjs.org"

      # Ensure absolute latest npm (trusted publishing needs >=11.5.1)
      - run: npm install -g npm@latest

      - run: npm publish --access public --provenance
